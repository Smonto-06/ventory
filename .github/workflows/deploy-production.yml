name: Deploy → Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string
      reason:
        description: 'Reason / changelog summary for this release'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate-input:
    name: Validate deployment confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation keyword
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ Deployment not confirmed. Type exactly 'deploy' to proceed."
            exit 1
          fi
          echo "✅ Confirmed by ${{ github.actor }}: ${{ github.event.inputs.reason }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs: validate-input

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (Production)
        run: railway up --service ventory-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}

      - name: Build & upload source maps to Sentry
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL_PRODUCTION }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_PRODUCTION }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL_PRODUCTION }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_PRODUCTION }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ventory-production
          NODE_ENV: production

      - name: Production deployment summary
        if: success()
        run: |
          echo "✅ PRODUCTION deployment successful"
          echo "Deployed by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "URL: ${{ secrets.NEXT_PUBLIC_APP_URL_PRODUCTION }}"

      - name: Production deployment failed
        if: failure()
        run: echo "❌ PRODUCTION deployment FAILED — immediate attention required"
