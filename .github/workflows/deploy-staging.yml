name: Deploy → Staging

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  migrate-and-seed:
    name: Migrate DB + Seed Pilot Data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Seed pilot data (idempotent upserts)
        run: npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Migration + seed succeeded
        if: success()
        run: echo "✅ DB migrated and pilot data seeded"

      - name: Migration or seed failed
        if: failure()
        run: echo "❌ DB migration/seed failed — check logs"

  deploy-to-railway:
    name: Deploy App to Railway Staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: staging
    needs: migrate-and-seed
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (lowercase tag required)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/smonto-06/ventory:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL_STAGING }}
            DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL_STAGING }}

      - name: Make container package public so Railway can pull it
        run: |
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/user/packages/container/ventory" \
            -d '{"visibility": "public"}')
          echo "Visibility change HTTP status: $RESULT"
          if [ "$RESULT" != "200" ]; then
            echo "⚠️  Could not set visibility via GITHUB_TOKEN (status $RESULT)."
            echo "    The board needs to go to:"
            echo "    https://github.com/Smonto-06/ventory/pkgs/container/ventory"
            echo "    and set the package to PUBLIC before Railway can pull it."
          else
            echo "✅ Package is now public — Railway can pull ghcr.io/smonto-06/ventory:staging"
          fi

      - name: Tell Railway to use the Docker image
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN_STAGING }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { serviceConnect(id: \"84ddb7de-0b80-4653-8f26-521bc9f2dfd2\", input: { image: \"ghcr.io/smonto-06/ventory:staging\" }) { id } }"}')
          echo "Railway serviceConnect: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "❌ Railway API error — service update failed"
          fi

      - name: Configure Railway service settings
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN_STAGING }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation($svc: String!, $env: String!, $in: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: $svc, environmentId: $env, input: $in) }",
              "variables": {
                "svc": "84ddb7de-0b80-4653-8f26-521bc9f2dfd2",
                "env": "15169bc4-2988-4f0a-a58a-aef61320020b",
                "in": {
                  "healthcheckPath": "/api/health",
                  "healthcheckTimeout": 300,
                  "startCommand": "node server.js",
                  "restartPolicyType": "ON_FAILURE",
                  "restartPolicyMaxRetries": 3
                }
              }
            }' | head -1

      - name: Wait for Railway deployment and check health
        run: |
          echo "Waiting 90s for Railway to start the container..."
          sleep 90
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "https://ventory-staging-production.up.railway.app/api/health")
            echo "Health check $i/10: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging healthy: https://ventory-staging-production.up.railway.app"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Health check timed out — Railway may still be starting or image is private"
          echo "    If image visibility error: go to https://github.com/Smonto-06/ventory/pkgs/container/ventory → change to Public"
          exit 1

      - name: Staging deployment summary
        if: success()
        run: |
          echo "✅ STAGING deployment complete"
          echo "URL: ${{ secrets.NEXTAUTH_URL_STAGING }}"
