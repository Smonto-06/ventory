name: Deploy → Staging

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  migrate-and-seed:
    name: Migrate DB + Seed Pilot Data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Seed pilot data (idempotent upserts)
        run: npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Migration + seed succeeded
        if: success()
        run: echo "✅ DB migrated and pilot data seeded"

      - name: Migration or seed failed
        if: failure()
        run: echo "❌ DB migration/seed failed — check logs"

  # Note: App deployment is handled automatically by Vercel
  # Vercel watches the master/main branch and auto-deploys on every push.
  # vercel.json defines the build command: prisma generate + migrate deploy + next build
